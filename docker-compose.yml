version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: secure-chat-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL:-admin@example.com}
    restart: unless-stopped
    networks:
      - secure-chat-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secure-chat-backend
    ports:
      - "3000:3000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_PRIVATE_KEY_PEM=${JWT_PRIVATE_KEY_PEM}
      - JWT_PUBLIC_KEY_PEM=${JWT_PUBLIC_KEY_PEM}
      - JWT_ALG=${JWT_ALG:-ES256}
      - JWT_ISSUER=${JWT_ISSUER:-ii4021-chat-backend}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-ii4021-chat-client}
      - JWT_EXPIRES_IN_SECONDS=${JWT_EXPIRES_IN_SECONDS:-3600}
      - PORT=3000
    restart: unless-stopped
    networks:
      - secure-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secure-chat-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - secure-chat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  secure-chat-network:
    driver: bridge

volumes:
  backend-logs:
  frontend-logs:
  caddy_data:
  caddy_config:
